<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARYAUDAY Volunteer Registration</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Volunteer Registration</h1>
  <form id="volunteerForm">
    <label for="vname">Full Name *</label>
    <input type="text" id="vname" name="name" required placeholder="Your name">
    
    <label for="vemail">Email *</label>
    <input type="email" id="vemail" name="email" required placeholder="your@email.com">
    
    <label for="vphone">Phone</label>
    <input type="tel" id="vphone" name="phone" placeholder="+91 98765 43210">
    
    <label for="vskill">How would you like to help?</label>
    <select id="vskill" name="skill">
      <option value="">Select an area</option>
      <option value="education">Teaching / Education</option>
      <option value="sports">Sports Promotion</option>
      <option value="elderly">Elderly / Vridh Ashram</option>
      <option value="women-safety">Women's Safety Initiative</option>
      <option value="gau-raksha">Gau-Raksha Initiative</option>
      <option value="other">Other</option>
    </select>
    
    <label for="vmessage">Message (optional)</label>
    <textarea id="vmessage" name="message" rows="3" placeholder="Tell us about yourself..."></textarea>
    
    <button type="submit">Submit</button>
  </form>

  <!-- Firebase & Firestore -->
  <script type="module">
    console.log("Firebase module loaded");

    // Import Firebase functions
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyDbZ17nBpVdpCV99hVERnJg6tbNyBxS2P4",
      authDomain: "aryauday-d2309.firebaseapp.com",
      databaseURL: "https://aryauday-d2309-default-rtdb.firebaseio.com",
      projectId: "aryauday-d2309",
      storageBucket: "aryauday-d2309.firebasestorage.app",
      messagingSenderId: "865852225907",
      appId: "1:865852225907:web:779ca558b240db2dae2d06",
      measurementId: "G-DTFPP0Y19Z"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Form submit
    const volunteerForm = document.getElementById("volunteerForm");
    if(volunteerForm){
      volunteerForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const name = volunteerForm.name.value;
        const email = volunteerForm.email.value;
        const phone = volunteerForm.phone.value;
        const skill = volunteerForm.skill.value;
        const message = volunteerForm.message.value;

        try {
          // Add document to Firestore
          await addDoc(collection(db, "volunteers"), {
            name,
            email,
            phone,
            skill,
            message,
            timestamp: new Date()
          });

          alert("Registration Successful! Thank you for joining.");
          volunteerForm.reset();
          console.log("Volunteer registered:", {name, email, phone, skill, message});
        } catch (err) {
          console.error("Error adding document:", err);
          alert("Failed to register. Please check console.");
        }
      });
    }
  </script>
</body>
</html>
